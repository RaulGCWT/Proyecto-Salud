version: '3.8'

services:
  # 1. Base de Datos DynamoDB Local
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb_welltech
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"

  # 2. Interfaz Gráfica para DynamoDB (Puerto 8001)
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: dynamodb_admin_welltech
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      - dynamodb-local

  # 3. Broker MQTT (Mosquitto)
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt_welltech
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # 4. Backend API (Flask + SocketIO)
  backend:
    build: .
    container_name: backend_welltech
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - DYNAMODB_URL=http://dynamodb-local:8000
    depends_on:
      - mqtt-broker
      - dynamodb-local

  # 5. Generador Dinámico de Camas (Simulador)
  cama-simulador:
    build: .
    container_name: generador_camas_welltech
    volumes:
      - .:/app
    # IMPORTANTE: Usamos -u para ver los prints y llamamos al orquestador
    command: python -u generadorCamas.py
    # Estas dos líneas son CRÍTICAS para que te deje escribir el número en la terminal
    stdin_open: true
    tty: true
    depends_on:
      - mqtt-broker