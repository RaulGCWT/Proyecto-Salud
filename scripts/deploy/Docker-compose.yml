version: '3.8'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb_welltech
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: dynamodb_admin_welltech
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      - dynamodb-local

  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt_welltech
    ports:
      - "1883:1883"
    volumes:
      - ../config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: backend_welltech
    ports:
      - "5000:5000"
    volumes:
      - ..:/app
    environment:
      - DYNAMODB_URL=http://dynamodb-local:8000
      - USE_AWS_DYNAMODB=${USE_AWS_DYNAMODB:-false}
      - USE_AWS_ALERTS_TABLE=${USE_AWS_ALERTS_TABLE:-false}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
      - ALERTS_TABLE_NAME=${ALERTS_TABLE_NAME:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    command: python -m src.app
    depends_on:
      - mqtt-broker
      - dynamodb-local
