version: '3.8'

services:
  localstack:
    image: localstack/localstack-pro:latest
    container_name: localstack_welltech
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - LOCALSTACK_AUTH_TOKEN=ls-ToHuQIwa-7086-7403-JAzo-piGIBeDAd018
      - SERVICES=dynamodb,s3
      - DEBUG=0
      - LOG_LICENSE_ISSUES=0
      - PERSISTENCE=0
      - AWS_DEFAULT_REGION=${AWS_REGION:-eu-west-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_EC2_METADATA_DISABLED=true
    volumes:
      - localstack_data:/var/lib/localstack

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: dynamodb_admin_welltech
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://localstack:4566
      - AWS_REGION=${AWS_REGION:-eu-west-1}
      - AWS_DEFAULT_REGION=${AWS_REGION:-eu-west-1}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - localstack

  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt_welltech
    ports:
      - "1883:1883"
    volumes:
      - ../config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: backend_welltech
    ports:
      - "5000:5000"
    volumes:
      - ..:/app
    environment:
      - DYNAMODB_URL=http://localstack:4566
      - MQTT_TRANSPORT=broker
      - MQTT_BROKER_HOST=mqtt-broker
      - MQTT_BROKER_PORT=1883
      - MQTT_TOPIC=residencia/camas/+/datos
      - FLASK_DEBUG=0
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      - USE_AWS_DYNAMODB=${USE_AWS_DYNAMODB:-false}
      - USE_AWS_ALERTS_TABLE=${USE_AWS_ALERTS_TABLE:-false}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
      - TELEMETRY_BUCKET_NAME=${TELEMETRY_BUCKET_NAME:-welltech-telemetry-history}
      - ALERTS_TABLE_NAME=${ALERTS_TABLE_NAME:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    command: python -m src.app
    depends_on:
      - mqtt-broker
      - localstack

volumes:
  localstack_data:
